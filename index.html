<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A beef | MTK インデックス</title>

<style>
:root{
  --blue:#2aa7d7;
  --blue2:#1b8fb8;

  /* ✅ 画像のような薄いブルーグレー */
  --pageBg:#dfe5ee;

  /* ✅ セクションの交互背景（帯） */
  --bandA: rgba(255,255,255,.32);
  --bandB: rgba(0,0,0,.03);

  /* ✅ 区切り線 */
  --rule: rgba(0,0,0,.14);

  --shadowH: 0 10px 24px rgba(0,0,0,.18);
}

*{box-sizing:border-box}
html, body{height:100%;}
body{
  margin:0;
  font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
  background: var(--pageBg);
  color:#0f1115;
  line-height:1.5;

  display:flex;
  flex-direction:column;
}

a{text-decoration:none;color:inherit}
.container{
  width:min(1120px, calc(100% - 24px));
  margin:auto;
}

/* ================= HEADER ================= */
header{
  background:#000;
  position:sticky;
  top:0;
  z-index:10;
  box-shadow: var(--shadowH);
}
.header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 0;
  gap:12px;
}
.brand{display:flex;align-items:center;}
.brand img{
  height:44px;
  width:auto;
  display:block;
}

/* PCボタン */
.contact-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background: linear-gradient(180deg, var(--blue), var(--blue2));
  color:#fff;
  font-weight:900;
  padding:10px 16px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.12);
  min-width:180px;
}

/* スマホ：小さい四角（ロゴ同じ高さ・右端） */
@media (max-width:520px){
  .brand img{height:32px;}
  .contact-btn{
    width:88px;
    height:32px;
    padding:0;
    border-radius:8px;
    font-size:11px;
    min-width:auto;
    line-height:1;
    white-space:nowrap;
  }
}

/* ================= MAIN ================= */
main{
  flex:1;
  padding:14px 0 22px;
}

/* タイトル */
.hero{
  text-align:center;
  margin:10px 0 14px;
}
.hero h1{
  margin:0;
  font-size:20px;
  font-weight:900;
  letter-spacing:.04em;
}

/* ✅ カード廃止：全幅の“帯”セクション + 線区切り */
.section{
  width:100%;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}
.section.bandA{ background: var(--bandA); }
.section.bandB{ background: var(--bandB); }

/* セクション内側（カード化しないため角丸・枠・影は一切つけない） */
.section .container{
  padding:14px 0;
}

/* セクションタイトル */
.section-title{
  text-align:left;
  font-size:14px;
  font-weight:900;
  margin:0 0 10px;
  letter-spacing:.02em;
}

/* ===== グリッド：スマホ3列固定 ===== */
.pill-grid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:8px;
}
@media (max-width:520px){
  .pill-grid{
    grid-template-columns: repeat(3, 1fr) !important;
  }
}

/* ===== ボタン（デザイン維持） ===== */
.pill-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#000;
  color:#fff;
  padding:6px 8px;
  min-height:36px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}
.pill-title{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  padding-right:6px;
}
.pill-icon{
  width:18px;
  height:18px;
  border-radius:50%;
  background:#fff;
  color:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  flex:0 0 auto;
}

/* PC拡張 */
@media (min-width:900px){
  main{padding:34px 0 54px;}
  .hero h1{font-size:26px;}
  .section .container{padding:18px 0;}
  .section-title{font-size:18px;margin-bottom:12px;}
  .pill-grid{grid-template-columns: repeat(4, 1fr); gap:12px;}
  .pill-btn{min-height:48px;font-size:14px;padding:12px 14px;}
  .pill-icon{width:26px;height:26px;font-size:13px;}
}

/* ================= FOOTER ================= */
footer{
  background:#000;
  color:#fff;
  padding:28px 0;
}
.footer-inner{
  display:grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap:20px;
}
.footer-left{
  font-size:13px;
  line-height:1.7;
}
.footer-links a{
  display:block;
  padding:3px 0;
  color:#ccc;
  font-size:13px;
}
@media(max-width:700px){
  .footer-inner{grid-template-columns:1fr;}
}
</style>
</head>

<body>

  <section class="section bandB">

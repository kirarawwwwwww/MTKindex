<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

<title>A beef | MTK インデックス</title>

<style>
:root{
  --pageBg:#dfe5ee;

  /* デスクトップは“透け”を活かす */
  --bandA: rgba(255,255,255,.35);
  --bandB: rgba(10,15,25,.04);
  --rule: rgba(15,23,42,.14);

  /* ボタン（黒すぎ回避：ディープスレート） */
  --btnBg1: rgba(15,23,42,.72);
  --btnBg2: rgba(30,41,59,.62);
  --btnBorder: rgba(255,255,255,.25);

  --blue:#2aa7d7;
  --blue2:#1b8fb8;

  --shadowH: 0 10px 24px rgba(0,0,0,.18);
  --shadowSoft:0 10px 30px rgba(15,23,42,.15);
}

*{box-sizing:border-box}
html,body{height:100%;}
html{ background: var(--pageBg); }

body{
  margin:0;
  font-family:'Montserrat','Noto Sans JP',sans-serif;
  color:#0f1115;
  line-height:1.5;
  display:flex;
  flex-direction:column;
  min-height:100dvh;
  background: var(--pageBg);
  position:relative;
  overflow-x:hidden;
}

/* ✅ 背景（PC/タブレット：上品なグラデ） */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(1200px 600px at 20% 0%, rgba(42,167,215,.18), transparent 60%),
    radial-gradient(900px 500px at 90% 10%, rgba(27,143,184,.14), transparent 55%),
    var(--pageBg);
  transform: translateZ(0);
}

/* ✅ スマホだけ「ズレる原因＝下地グラデ」を止める */
@media (max-width:520px){
  body::before{
    background: var(--pageBg);
  }
  /* ✅ スマホは帯を“少し不透明”にして透けを減らし、ズレ感ゼロへ */
  :root{
    --bandA: rgba(255,255,255,.55);
    --bandB: rgba(210,222,236,.55); /* ほんのりブルーグレー */
  }
}

a{text-decoration:none;color:inherit}
.container{
  width:min(1120px, calc(100% - 24px));
  margin:auto;
}

/* ================= HEADER ================= */
header{
  background:rgba(0,0,0,.9);
  position:sticky;
  top:0;
  z-index:10;
  box-shadow:var(--shadowH);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 0;
  gap:12px;
}
.brand img{height:44px; width:auto; display:block;}

.contact-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(180deg,var(--blue),var(--blue2));
  color:#fff;
  font-weight:900;
  padding:10px 16px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.12);
  min-width:180px;
  letter-spacing:.04em;
}
@media (max-width:520px){
  .brand img{height:32px;}
  .contact-btn{
    width:88px;
    height:32px;
    padding:0;
    border-radius:8px;
    font-size:11px;
    min-width:auto;
    white-space:nowrap;
    line-height:1;
  }
}

/* ================= MAIN ================= */
main{
  flex:1;
  padding:20px 0 40px;
}

.hero{
  text-align:center;
  margin:12px 0 18px;
}
.hero h1{
  margin:0;
  font-size:24px;
  font-weight:900;
  letter-spacing:.12em;
}

/* ================= SECTIONS ================= */
.section{
  width:100%;
  border-top:1px solid var(--rule);
  border-bottom:1px solid var(--rule);
}
.section.bandA{background:var(--bandA);}
.section.bandB{background:var(--bandB);}
.section .container{padding:18px 0;}

.section-title{
  text-align:center;
  font-size:16px;
  font-weight:900;
  margin:0 0 14px;
  letter-spacing:.08em;
}

.pill-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

/* ガラス風ボタン（黒#000は使わない） */
.pill-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:linear-gradient(180deg,var(--btnBg1),var(--btnBg2));
  color:#fff;
  padding:10px 14px;
  min-height:46px;
  border-radius:16px;
  font-size:13px;
  font-weight:900;
  border:1px solid var(--btnBorder);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  box-shadow:var(--shadowSoft);
  transition:transform .2s ease, filter .2s ease, box-shadow .2s ease;
}
.pill-btn:hover{
  transform:translateY(-3px);
  filter:brightness(1.08);
  box-shadow:0 14px 34px rgba(15,23,42,.18);
}
.pill-title{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  padding-right:8px;
}
.pill-icon{
  width:24px;
  height:24px;
  border-radius:999px;
  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.3);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  flex:0 0 auto;
}

@media(min-width:900px){
  .pill-grid{grid-template-columns:repeat(4,1fr); gap:14px;}
  .pill-btn{min-height:56px; font-size:15px; padding:14px 16px;}
  .pill-icon{width:28px; height:28px; font-size:14px;}
  .section-title{font-size:20px;}
}

/* ================= FOOTER ================= */
footer{
  background:#000;
  color:#fff;
  padding:28px 0;
}
.footer-inner{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
}
.footer-left{
  font-size:13px;
  line-height:1.7;
}
.footer-links a{
  display:block;
  padding:4px 0;
  color:#ccc;
  font-size:13px;
}
@media(max-width:700px){
  .footer-inner{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <a class="brand" href="#">
      <img src="logo.png" alt="A beef ロゴ">
    </a>
    <a href="#" class="contact-btn">アプリ管理</a>
  </div>
</header>

<main>

  <div class="container hero">
    <h1>MTK インデックス</h1>
  </div>

  <!-- 💰 お金 -->
  <section class="section bandA">
    <div class="container">
      <div class="section-title">💰 お金</div>
      <div class="pill-grid">
        <a class="pill-btn" href="#"><span class="pill-title">予定</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">支出</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">ランコス</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">予算</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">資産</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">税</span><span class="pill-icon">→</span></a>
      </div>
    </div>
  </section>

  <!-- 🧠 自分 -->
  <section class="section bandB">
    <div class="container">
      <div class="section-title">🧠 自分</div>
      <div class="pill-grid">
        <a class="pill-btn" href="#"><span class="pill-title">自分</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">ルール</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">振返</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">体調</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">目標</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">学び</span><span class="pill-icon">→</span></a>
      </div>
    </div>
  </section>

  <!-- ✅ 日常 -->
  <section class="section bandA">
    <div class="container">
      <div class="section-title">✅ 日常</div>
      <div class="pill-grid">
        <a class="pill-btn" href="#"><span class="pill-title">日常</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">タスク</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">共有</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">買物</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">家事</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">連絡</span><span class="pill-icon">→</span></a>
      </div>
    </div>
  </section>

  <!-- 🎮 遊び -->
  <section class="section bandB">
    <div class="container">
      <div class="section-title">🎮 遊び</div>
      <div class="pill-grid">
        <a class="pill-btn" href="#"><span class="pill-title">遊び</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">ログ</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">旅行</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">映画</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">本</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">外食</span><span class="pill-icon">→</span></a>
      </div>
    </div>
  </section>

  <!-- 💼 仕事 -->
  <section class="section bandA">
    <div class="container">
      <div class="section-title">💼 仕事</div>
      <div class="pill-grid">
        <a class="pill-btn" href="#"><span class="pill-title">仕事</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">開発</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">学習</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">資料</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">会議</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">企画</span><span class="pill-icon">→</span></a>
      </div>
    </div>
  </section>

</main>

<footer>
  <div class="container footer-inner">
    <div class="footer-left">
      <strong>A beef</strong><br>
      株式会社MTK<br>
      代表取締役
    </div>
    <div class="footer-links">
      <a href="#">ホーム</a>
      <a href="#">サービス</a>
      <a href="#">会社概要</a>
      <a href="#">お問合せ</a>
    </div>
    <div></div>
  </div>
</footer>

</body>
</html>

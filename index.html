<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A beef | MTK インデックス</title>

<style>
:root{
  --cardLav:#dcd0f0;
  --cardGry:#e8e8e8;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
  background: linear-gradient(180deg, #ffffff, #f7f3ea 100%);
}
a{text-decoration:none;color:inherit}
.container{
  width:calc(100% - 28px);
  margin:auto;
}

/* ===== HEADER（共通） ===== */
header{
  background:#000;
  box-shadow: 0 10px 24px rgba(0,0,0,.18);
}
.header-inner{
  padding:16px 0;
  display:flex;
  align-items:center;
  justify-content:center; /* PCは中央 */
  gap:12px;
}
.brand img{
  height:34px;
  width:auto;
  display:block;
}

/* 既定（PC/タブレット）：横幅あるので大きいボタンOK */
.contact-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(180deg,#2aa7d7,#1b8fb8);
  color:#fff;
  padding:12px 18px;
  font-weight:900;
  border-radius:14px;
  min-width:220px;
}

/* ===== MAIN ===== */
.main{padding:20px 0;}
.hero{text-align:center;margin:0 0 12px;}
.hero h1{margin:0;font-size:20px;font-weight:900;}

/* ===== CATEGORY CARD ===== */
.section{
  margin-bottom:12px;
  border-radius:18px;
  padding:12px 10px;
}
.lav{background:var(--cardLav);}
.gry{background:var(--cardGry);}

.section-title{
  text-align:center;
  font-size:15px;
  font-weight:900;
  margin-bottom:8px;
}

/* ===== 2列グリッド（スマホ基準） ===== */
.pill-grid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:8px;
}

/* ===== 超コンパクトボタン ===== */
.pill-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;

  background:#000;
  color:#fff;

  padding:8px 10px;
  min-height:40px;
  border-radius:999px;

  font-size:12px;
  font-weight:800;
}
.pill-title{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.pill-icon{
  width:22px;
  height:22px;
  border-radius:50%;
  background:#fff;
  color:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  flex-shrink:0;
}

/* ===== PCだけ広く（任意） ===== */
@media (min-width: 900px){
  .container{max-width:1100px;}
  .header-inner{justify-content:space-between;}
  .brand img{height:44px;}
  .contact-btn{min-width:240px;}
  .pill-grid{grid-template-columns: repeat(3, 1fr);}
}

/* =========================================================
   ✅ スマホのみ：ロゴと同じ高さで右端に「小さい四角ボタン」
   ========================================================= */
@media (max-width: 520px){
  .header-inner{
    padding:14px 0;
    justify-content:space-between; /* 左ロゴ・右ボタン */
  }

  .brand img{
    height:34px; /* ロゴ高さ */
  }

  /* 「HPへ移動」を小さく四角（角丸）に */
  .contact-btn{
    min-width:auto;
    width:92px;               /* 小さめ */
    height:34px;              /* ロゴと同じ高さ */
    padding:0 10px;
    border-radius:10px;       /* 四角寄り */
    font-size:12px;
    font-weight:900;
    line-height:1;
    white-space:nowrap;
  }
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <a class="brand" href="#">
      <img src="logo.png" alt="A beef ロゴ">
    </a>
    <a href="#" class="contact-btn">HPへ移動</a>
  </div>
</header>

<main class="main">
  <div class="container">

    <div class="hero">
      <h1>MTK インデックス</h1>
    </div>

    <!-- お金 -->
    <div class="section lav">
      <div class="section-title">💰 お金</div>
      <div class="pill-grid">
        <a class="pill-btn" href="#"><span class="pill-title">購入予定</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">支出管理</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">ランニング</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">予算</span><span class="pill-icon">→</span></a>
      </div>
    </div>

    <!-- 自分 -->
    <div class="section gry">
      <div class="section-title">🧠 自分</div>
      <div class="pill-grid">
        <a class="pill-btn" href="#"><span class="pill-title">自分とは</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">自分ルール</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">振り返り</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">体調</span><span class="pill-icon">→</span></a>
      </div>
    </div>

    <!-- 日常 -->
    <div class="section lav">
      <div class="section-title">✅ 日常</div>
      <div class="pill-grid">
        <a class="pill-btn" href="#"><span class="pill-title">日常利用</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">タスク</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">共有</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">買い物</span><span class="pill-icon">→</span></a>
      </div>
    </div>

  </div>
</main>

</body>
</html>

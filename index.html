<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

<title>A beef | MTK インデックス</title>

<style>
:root{
  --pageBg:#dfe5ee;

  --bandA: rgba(255,255,255,.35);
  --bandB: rgba(10,15,25,.04);
  --rule: rgba(15,23,42,.14);

  --btnBg1: rgba(15,23,42,.72);
  --btnBg2: rgba(30,41,59,.62);
  --btnBorder: rgba(255,255,255,.25);

  --blue:#2aa7d7;
  --blue2:#1b8fb8;

  --shadowH: 0 10px 24px rgba(0,0,0,.18);
  --shadowSoft:0 10px 30px rgba(15,23,42,.15);
}

*{box-sizing:border-box}
html,body{height:100%;}
html{ background: var(--pageBg); }

body{
  margin:0;
  font-family:'Montserrat','Noto Sans JP',sans-serif;
  color:#0f1115;
  display:flex;
  flex-direction:column;
  min-height:100dvh;
  background: var(--pageBg);
  position:relative;
  overflow-x:hidden;
}

/* 背景 */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(1200px 600px at 20% 0%, rgba(42,167,215,.18), transparent 60%),
    radial-gradient(900px 500px at 90% 10%, rgba(27,143,184,.14), transparent 55%),
    var(--pageBg);
}

/* スマホ背景固定 */
@media (max-width:520px){
  body::before{ background: var(--pageBg); }
  :root{
    --bandA: rgba(255,255,255,.55);
    --bandB: rgba(210,222,236,.55);
  }
}

a{text-decoration:none;color:inherit}
.container{
  width:min(1120px, calc(100% - 24px));
  margin:auto;
}

/* ================= HEADER ================= */
header{
  background:rgba(0,0,0,.9);
  position:sticky;
  top:0;
  z-index:10;
  box-shadow:var(--shadowH);
  backdrop-filter:blur(10px);
}

.header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 0;
  gap:12px;
}

.brand img{height:44px;}

.header-actions{
  display:flex;
  align-items:center;
  gap:8px;
}

/* PCサイズ */
.contact-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(180deg,var(--blue),var(--blue2));
  color:#fff;
  font-weight:900;
  padding:10px 16px;
  border-radius:12px;
  min-width:180px;
}

.refresh-btn{
  width:40px;
  height:40px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.10);
  color:#fff;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* ✅ スマホのみ幅変更 */
@media (max-width:520px){

  .brand img{height:32px;}

  .header-actions{
    flex:1;
  }

  /* flex比率 1 : 2 */
  .contact-btn{
    flex:1;             /* ← 半分 */
    min-width:0;
    height:32px;
    font-size:11px;
    padding:0;
    border-radius:8px;
  }

  .refresh-btn{
    flex:2;             /* ← 2倍 */
    height:32px;
    border-radius:8px;
    font-size:16px;
  }
}

/* ================= MAIN ================= */
main{
  flex:1;
  padding:20px 0 40px;
}

.hero{
  text-align:center;
  margin-bottom:20px;
}
.hero h1{
  margin:0;
  font-size:24px;
  font-weight:900;
  letter-spacing:.12em;
}

/* ================= SECTION ================= */
.section{
  border-top:1px solid var(--rule);
  border-bottom:1px solid var(--rule);
}
.section.bandA{background:var(--bandA);}
.section.bandB{background:var(--bandB);}
.section .container{padding:18px 0;}

.section-title{
  text-align:center;
  font-size:18px;
  font-weight:900;
  margin:0 0 16px;
}

.pill-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.pill-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:linear-gradient(180deg,var(--btnBg1),var(--btnBg2));
  color:#fff;
  padding:12px 16px;
  min-height:50px;
  border-radius:18px;
  font-size:14px;
  font-weight:900;
  border:1px solid var(--btnBorder);
  backdrop-filter:blur(8px);
  box-shadow:var(--shadowSoft);
}

.pill-icon{
  width:26px;
  height:26px;
  border-radius:999px;
  background:rgba(255,255,255,.18);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* スマホボタン小さめ */
@media (max-width:520px){
  .pill-btn{
    padding:6px 8px;
    min-height:34px;
    font-size:10px;
    border-radius:14px;
  }
  .pill-icon{
    width:18px;
    height:18px;
    font-size:10px;
  }
}

/* FOOTER */
footer{
  background:#000;
  color:#fff;
  padding:28px 0;
}
.footer-inner{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
}
@media(max-width:700px){
  .footer-inner{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <a class="brand" href="#">
      <img src="logo.png" alt="A beef ロゴ">
    </a>

    <div class="header-actions">
      <a href="#" class="contact-btn">アプリ管理</a>
      <button id="refreshBtn" class="refresh-btn">⟳</button>
    </div>
  </div>
</header>

<main>

<div class="container hero">
  <h1>MTK インデックス</h1>
</div>

<section class="section bandA">
<div class="container">
<div class="section-title">Life style</div>
<div class="pill-grid">
<a class="pill-btn" href="#"><span>時刻表</span><span class="pill-icon">→</span></a>
<a class="pill-btn" href="#"><span>購入リスト</span><span class="pill-icon">→</span></a>
<a class="pill-btn" href="#"><span>P共有</span><span class="pill-icon">→</span></a>
</div>
</div>
</section>

</main>

<footer>
<div class="container footer-inner">
<div>
<strong>A beef</strong><br>
株式会社MTK
</div>
<div></div>
<div></div>
</div>
</footer>

<script>
document.getElementById("refreshBtn").addEventListener("click", function(){
  location.reload();
});
</script>

</body>
</html>

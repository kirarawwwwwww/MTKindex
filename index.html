<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

<title>A beef | MTK インデックス</title>

<style>
:root{
  --pageBg:#dfe5ee;

  --bandA: rgba(255,255,255,.35);
  --bandB: rgba(10,15,25,.04);
  --rule: rgba(15,23,42,.14);

  --btnBg1: rgba(15,23,42,.72);
  --btnBg2: rgba(30,41,59,.62);
  --btnBorder: rgba(255,255,255,.25);

  --blue:#2aa7d7;
  --blue2:#1b8fb8;

  --shadowH: 0 10px 24px rgba(0,0,0,.18);
  --shadowSoft: 0 10px 30px rgba(15,23,42,.15);
}

*{box-sizing:border-box}
html,body{height:100%;}
html{ background: var(--pageBg); }

body{
  margin:0;
  font-family:'Montserrat','Noto Sans JP',sans-serif;
  color:#0f1115;
  line-height:1.5;
  display:flex;
  flex-direction:column;
  min-height:100dvh;
  background: var(--pageBg);
  position:relative;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(1200px 600px at 20% 0%, rgba(42,167,215,.18), transparent 60%),
    radial-gradient(900px 500px at 90% 10%, rgba(27,143,184,.14), transparent 55%),
    var(--pageBg);
}

@media (max-width:520px){
  body::before{ background: var(--pageBg); }
  :root{
    --bandA: rgba(255,255,255,.55);
    --bandB: rgba(210,222,236,.55);
  }
}

a{text-decoration:none;color:inherit}
.container{
  width:min(1120px, calc(100% - 24px));
  margin:auto;
}

/* ================= HEADER ================= */
header{
  background:rgba(0,0,0,.9);
  position:sticky;
  top:0;
  z-index:10;
  box-shadow:var(--shadowH);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 0;
  gap:12px;
}
.brand{display:flex; align-items:center; flex:0 0 auto;}
.brand img{height:44px; width:auto; display:block;}

.header-actions{
  display:flex;
  align-items:center;
  gap:8px;
  flex:0 0 auto;
}

.contact-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(180deg,var(--blue),var(--blue2));
  color:#fff;
  font-weight:900;
  padding:10px 16px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.12);
  min-width:180px;
  letter-spacing:.04em;
}

.refresh-btn{
  width:20px;
  height:40px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.10);
  color:#fff;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  -webkit-tap-highlight-color: transparent;
}
.refresh-btn:active{ transform: scale(.98); }

@media (max-width:520px){
  .brand img{height:32px;}
  .header-actions{ flex:1; }

  .contact-btn{
    flex:1;
    min-width:0;
    height:32px;
    padding:0;
    border-radius:8px;
    font-size:11px;
    line-height:1;
    white-space:nowrap;
    width:32.5%;
  }

  .refresh-btn{
    flex:1;
    min-width:0;
    height:32px;
    border-radius:8px;
    font-size:22px;
    width:17.5%;
  }
}

/* ================= MAIN ================= */
main{
  flex:1;
  padding:20px 0 40px;
}
.hero{
  text-align:center;
  margin:12px 0 18px;
}
.hero h1{
  margin:0;
  font-size:24px;
  font-weight:900;
  letter-spacing:.12em;
}

/* ================= SECTIONS ================= */
.section{
  border-top:1px solid var(--rule);
  border-bottom:1px solid var(--rule);
}
.section.bandA{background:var(--bandA);}
.section.bandB{background:var(--bandB);}
.section .container{padding:18px 0;}

.section-title{
  text-align:center;
  font-size:18px;
  font-weight:900;
  margin:0 0 16px;
  letter-spacing:.08em;
}

.pill-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.pill-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:linear-gradient(180deg,var(--btnBg1),var(--btnBg2));
  color:#fff;
  padding:12px 16px;
  min-height:50px;
  border-radius:18px;
  font-size:14px;
  font-weight:900;
  border:1px solid var(--btnBorder);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  box-shadow:var(--shadowSoft);
  transition:transform .2s ease, filter .2s ease, box-shadow .2s ease;
}
.pill-btn:hover{
  transform:translateY(-3px);
  filter:brightness(1.08);
  box-shadow:0 14px 34px rgba(15,23,42,.18);
}
.pill-title{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  padding-right:8px;
}
.pill-icon{
  width:26px;
  height:26px;
  border-radius:999px;
  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.3);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  flex:0 0 auto;
}

@media (max-width:520px){
  main{ padding:16px 0 32px; }
  .hero h1{ font-size:20px; }

  .section .container{ padding:14px 0; }
  .section-title{ font-size:14px; margin:0 0 12px; }

  .pill-grid{ gap:10px; }

  .pill-btn{
    padding:6px 8px;
    min-height:34px;
    border-radius:14px;
    font-size:10px;
  }
  .pill-icon{
    width:18px;
    height:18px;
    font-size:10px;
  }
}

/* PC */
@media(min-width:900px){
  .pill-grid{grid-template-columns:repeat(4,1fr); gap:14px;}
  .pill-btn{min-height:56px; font-size:15px;}
  .section-title{font-size:20px;}
}

/* ================= FOOTER ================= */
footer{
  background:#000;
  color:#fff;
  padding:28px 0;
}
.footer-inner{
  display:grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap:20px;
}
.footer-left{
  font-size:13px;
  line-height:1.7;
}
.footer-links a{
  display:block;
  padding:4px 0;
  color:#ccc;
  font-size:13px;
}
@media(max-width:700px){
  .footer-inner{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <a class="brand" href="#">
      <img src="logo.png" alt="A beef ロゴ">
    </a>

    <div class="header-actions">
      <a href="#" class="contact-btn">アプリ管理</a>
      <button id="refreshBtn" class="refresh-btn" type="button" aria-label="更新" title="更新">⟳</button>
    </div>
  </div>
</header>

<main>

  <div class="container hero">
    <h1>MTK インデックス</h1>
  </div>

 <!-- Life style -->
<section class="section bandA">
  <div class="container">
    <div class="section-title">Life style</div>
    <div class="pill-grid">
      <a class="pill-btn" href="#"><span class="pill-title">時刻表</span><span class="pill-icon">→</span></a>
      <a class="pill-btn" href="#"><span class="pill-title">購入リスト</span><span class="pill-icon">→</span></a>
      <a class="pill-btn" href="#"><span class="pill-title">P共有</span><span class="pill-icon">→</span></a>
      <a class="pill-btn" href="#"><span class="pill-title">Wタスク</span><span class="pill-icon">→</span></a>
      <a class="pill-btn" href="#"><span class="pill-title">Pタスク</span><span class="pill-icon">→</span></a>
      <a class="pill-btn" href="#"><span class="pill-title">支出管理</span><span class="pill-icon">→</span></a>
    </div>
  </div>
</section>
  
  <!-- Work -->
  <section class="section bandB">
    <div class="container">
      <div class="section-title">Work</div>
      <div class="pill-grid">
        <a class="pill-btn" href="#"><span class="pill-title">メールログ</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">ランコス</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">監視ログ</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">顧客情報</span><span class="pill-icon">→</span></a>
      </div>
    </div>
  </section>

<!-- Private -->
<section class="section bandA">
  <div class="container">
    <div class="section-title">Private</div>
    <div class="pill-grid">
      <a class="pill-btn" href="#"><span class="pill-title">ルール</span><span class="pill-icon">→</span></a>
      <a class="pill-btn" href="#"><span class="pill-title">名言</span><span class="pill-icon">→</span></a>

      <!-- 追加 -->
      <a class="pill-btn" href="#"><span class="pill-title">やりたい事</span><span class="pill-icon">→</span></a>
      <a class="pill-btn" href="#"><span class="pill-title">行きたい場所</span><span class="pill-icon">→</span></a>
    </div>
  </div>
</section>

</main>

<footer>
  <div class="container footer-inner">

    <!-- 左：会社情報 -->
    <div class="footer-left">
      <strong>A beef</strong><br>
      株式会社MTK<br>
      代表取締役
    </div>

    <!-- 中央：空白 -->
    <div class="footer-spacer"></div>

    <!-- 右：フッターリンク -->
    <div class="footer-links">
      <a href="#">ホーム</a>
      <a href="#">サービス</a>
      <a href="#">会社概要</a>
      <a href="#">お問合せ</a>
    </div>

  </div>
</footer>

<style>
/* ================= FOOTER ================= */
footer{
  background:#000;
  color:#fff;
  padding:28px 0;
}

.footer-inner{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
}

.footer-left{
  font-size:13px;
  line-height:1.7;
}

/* PC時：右寄せ */
.footer-links{
  justify-self:end;
}

.footer-links a{
  display:block;
  padding:4px 0;
  color:#ccc;
  font-size:13px;
}

/* スマホ時：リンクを中央寄せ */
@media(max-width:700px){
  .footer-links{
    justify-self:center;
    text-align:center;
  }
}
</style>

<script>
  (function(){
    const btn = document.getElementById('refreshBtn');
    if(!btn) return;
    btn.addEventListener('click', function(){
      const url = new URL(location.href);
      url.searchParams.set('_r', Date.now());
      location.replace(url.toString());
    });
  })();
</script>

</body>
</html>

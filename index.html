<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

<title>A beef | MTK インデックス</title>

<style>
:root{
  --pageBg:#dfe5ee;

  --bandA: rgba(255,255,255,.35);
  --bandB: rgba(10,15,25,.04);
  --rule: rgba(15,23,42,.14);

  --btnBg1: rgba(15,23,42,.72);
  --btnBg2: rgba(30,41,59,.62);
  --btnBorder: rgba(255,255,255,.25);

  --blue:#2aa7d7;
  --blue2:#1b8fb8;

  --shadowSoft:0 10px 30px rgba(15,23,42,.15);
}

*{box-sizing:border-box}
html,body{height:100%;}

body{
  margin:0;
  font-family:'Montserrat','Noto Sans JP',sans-serif;
  background:
    radial-gradient(1200px 600px at 20% 0%, rgba(42,167,215,.18), transparent 60%),
    radial-gradient(900px 500px at 90% 10%, rgba(27,143,184,.14), transparent 55%),
    var(--pageBg);
  color:#0f1115;
  display:flex;
  flex-direction:column;
}

a{text-decoration:none;color:inherit}
.container{
  width:min(1120px, calc(100% - 24px));
  margin:auto;
}

/* HEADER */
header{
  background:rgba(0,0,0,.9);
  position:sticky;
  top:0;
  z-index:10;
  backdrop-filter:blur(10px);
}
.header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 0;
}
.brand img{height:44px;}

.contact-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(180deg,var(--blue),var(--blue2));
  color:#fff;
  font-weight:900;
  padding:10px 16px;
  border-radius:12px;
  min-width:180px;
}

@media(max-width:520px){
  .brand img{height:32px;}
  .contact-btn{
    width:88px;
    height:32px;
    padding:0;
    font-size:11px;
    border-radius:8px;
  }
}

/* MAIN */
main{
  flex:1;
  padding:20px 0 40px;
}

.hero{
  text-align:center;
  margin-bottom:20px;
}
.hero h1{
  margin:0;
  font-size:24px;
  font-weight:900;
  letter-spacing:.12em;
}

/* SECTION */
.section{
  border-top:1px solid var(--rule);
  border-bottom:1px solid var(--rule);
}
.section.bandA{background:var(--bandA);}
.section.bandB{background:var(--bandB);}
.section .container{padding:18px 0;}

.section-title{
  text-align:center;
  font-size:16px;
  font-weight:900;
  margin:0 0 14px;
  letter-spacing:.08em;
}

.pill-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

/* ガラス風ボタン */
.pill-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:linear-gradient(180deg,var(--btnBg1),var(--btnBg2));
  color:#fff;
  padding:10px 14px;
  min-height:46px;
  border-radius:16px;
  font-size:13px;
  font-weight:800;
  border:1px solid var(--btnBorder);
  backdrop-filter:blur(8px);
  box-shadow:var(--shadowSoft);
  transition:.2s ease;
}
.pill-btn:hover{
  transform:translateY(-3px);
  filter:brightness(1.08);
}

.pill-icon{
  width:24px;
  height:24px;
  border-radius:999px;
  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.3);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
}

/* PC */
@media(min-width:900px){
  .pill-grid{grid-template-columns:repeat(4,1fr);}
  .pill-btn{min-height:56px;font-size:15px;}
}

/* FOOTER */
footer{
  background:#000;
  color:#fff;
  padding:28px 0;
}
.footer-inner{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
}
.footer-links a{
  display:block;
  color:#ccc;
  padding:4px 0;
}
@media(max-width:700px){
  .footer-inner{grid-template-columns:1fr;}
}
</style>
</head>

<body>

</html>

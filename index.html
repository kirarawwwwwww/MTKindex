<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A beef | ダッシュボード</title>

<style>
:root{
  --blue:#2aa7d7;
  --blue2:#1b8fb8;
  --text:#0f1115;
  --container:1120px;
  --shadow2: 0 10px 26px rgba(0,0,0,.08);
  --gradA: linear-gradient(180deg, #ffffff, #f7f3ea 100%);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
  color:var(--text);
  background: var(--gradA);
}
a{text-decoration:none;color:inherit}
.container{
  width:min(var(--container), calc(100% - 44px));
  margin:auto;
}

/* ===== HEADER ===== */
header{
  background:#000;
  position:sticky;
  top:0;
  z-index:10;
  box-shadow: 0 10px 24px rgba(0,0,0,.18);
}
.header-inner{
  height:80px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.brand img{
  height:44px;
  width:auto;
}
.contact-btn{
  background: linear-gradient(180deg, var(--blue), var(--blue2));
  color:#fff;
  padding:10px 16px;
  font-weight:900;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.12);
}

/* ===== MAIN ===== */
.main{padding:60px 0}

.hero{
  text-align:center;
  margin-bottom:40px;
}
.hero h1{
  margin:0;
  font-size:26px;
  font-weight:950;
}
.hero p{
  margin-top:12px;
  font-weight:900;
  color:rgba(15,17,21,.65);
}

/* ===== セクション枠 ===== */
.section{
  margin-bottom:40px;
}
.section-title{
  font-weight:950;
  margin-bottom:16px;
}

/* ===== ピル型ボタン ===== */
.pill-grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:16px;
}
@media (max-width: 960px){
  .pill-grid{grid-template-columns:1fr;}
}

.pill-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 24px;
  min-height:70px;
  border-radius:999px;
  background:#fff;
  border:1px solid rgba(15,17,21,.12);
  box-shadow: var(--shadow2);
  font-weight:950;
  transition:.25s ease;
}

.pill-left{
  min-width:0;
}
.pill-title{
  margin:0;
  font-size:15px;
}
.pill-sub{
  margin-top:6px;
  font-size:12px;
  font-weight:900;
  color:rgba(15,17,21,.6);
}

/* 右丸矢印 */
.pill-icon{
  width:46px;
  height:46px;
  border-radius:999px;
  display:grid;
  place-items:center;
  background:#000;
  color:#fff;
  font-size:18px;
  transition:.25s ease;
}

/* hover状態 */
.pill-btn:hover{
  background:#000;
  color:#fff;
}
.pill-btn:hover .pill-sub{
  color:rgba(255,255,255,.7);
}
.pill-btn:hover .pill-icon{
  background:#fff;
  color:#000;
  transform:translateX(6px);
}

/* ===== FOOTER ===== */
footer{
  background:#000;
  color:#fff;
  padding:50px 0;
  margin-top:60px;
}
.footer-inner{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:30px;
}
footer a{color:#ccc}
.footer-links a{
  display:block;
  padding:4px 0;
}
@media(max-width:700px){
  .footer-inner{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <a class="brand" href="#">
      <!-- ★ここが修正ポイント -->
      <img src="ロゴ横長.png" alt="A beef ロゴ">
    </a>
    <a href="#" class="contact-btn">HPへ移動</a>
  </div>
</header>

<main class="main">
  <div class="container">

    <div class="hero">
      <h1>ダッシュボード</h1>
      <p>よく使う項目をワンタップで</p>
    </div>

    <!-- お金 -->
    <div class="section">
      <div class="section-title">💰 お金</div>
      <div class="pill-grid">

        <a class="pill-btn" href="#">
          <div class="pill-left">
            <div class="pill-title">購入予定</div>
            <div class="pill-sub">欲しい物・優先度管理</div>
          </div>
          <div class="pill-icon">→</div>
        </a>

        <a class="pill-btn" href="#">
          <div class="pill-left">
            <div class="pill-title">支出管理</div>
            <div class="pill-sub">日付・カテゴリ・金額</div>
          </div>
          <div class="pill-icon">→</div>
        </a>

      </div>
    </div>

    <!-- 自分 -->
    <div class="section">
      <div class="section-title">🧠 自分</div>
      <div class="pill-grid">

        <a class="pill-btn" href="#">
          <div class="pill-left">
            <div class="pill-title">自分とは</div>
            <div class="pill-sub">価値観・判断基準</div>
          </div>
          <div class="pill-icon">→</div>
        </a>

        <a class="pill-btn" href="#">
          <div class="pill-left">
            <div class="pill-title">自分ルール</div>
            <div class="pill-sub">行動基準まとめ</div>
          </div>
          <div class="pill-icon">→</div>
        </a>

      </div>
    </div>

  </div>
</main>

<footer>
  <div class="container footer-inner">

    <div>
      <strong>A beef</strong><br>
      All rights reserved.
    </div>

    <div class="footer-links">
      <a href="#">ホーム</a>
      <a href="#">サービス</a>
      <a href="#">会社情報</a>
      <a href="#">お問い合わせ</a>
    </div>

    <div></div>

  </div>
</footer>

</body>
</html>

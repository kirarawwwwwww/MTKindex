<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ✅ 洗練：Apple寄りに見える組み合わせ（英字=Montserrat / 日本語=Noto Sans JP） -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

<title>A beef | MTK インデックス</title>

<style>
:root{
  --blue:#2aa7d7;
  --blue2:#1b8fb8;

  /* 背景（薄いブルーグレー） */
  --pageBg:#dfe5ee;

  /* 帯（交互背景） */
  --bandA: rgba(255,255,255,.35);
  --bandB: rgba(10,15,25,.04);

  /* 区切り線 */
  --rule: rgba(15, 23, 42, .14);

  /* ガラスUI（共通） */
  --glass: rgba(255,255,255,.22);
  --glass2: rgba(255,255,255,.14);
  --glassBorder: rgba(255,255,255,.38);
  --glassBorder2: rgba(15,23,42,.10);

  /* ✅ ボタン（黒じゃない：ディープスレート + 透明感） */
  --btnBg1: rgba(15, 23, 42, .72);
  --btnBg2: rgba(30, 41, 59, .62);
  --btnBorder: rgba(255,255,255,.22);

  --shadowH: 0 10px 24px rgba(0,0,0,.18);
  --shadowSoft: 0 10px 30px rgba(15,23,42,.14);
  --shadowBtn: 0 10px 24px rgba(15,23,42,.18);
}

*{box-sizing:border-box}
html, body{height:100%;}

body{
  margin:0;
  font-family:'Montserrat','Noto Sans JP',system-ui,-apple-system,sans-serif;
  background: radial-gradient(1200px 600px at 20% 0%, rgba(42,167,215,.18), transparent 60%),
              radial-gradient(900px 500px at 90% 10%, rgba(27,143,184,.14), transparent 55%),
              var(--pageBg);
  color:#0f1115;
  line-height:1.5;
  display:flex;
  flex-direction:column;
}

a{text-decoration:none;color:inherit}
.container{
  width:min(1120px, calc(100% - 24px));
  margin:auto;
}

/* ================= HEADER ================= */
header{
  background: rgba(0,0,0,.88);
  position:sticky;
  top:0;
  z-index:10;
  box-shadow: var(--shadowH);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 0;
  gap:12px;
}
.brand{display:flex; align-items:center;}
.brand img{
  height:44px;
  width:auto;
  display:block;
}

/* 右上ボタン（アプリ管理） */
.contact-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background: linear-gradient(180deg, var(--blue), var(--blue2));
  color:#fff;
  font-weight:900;
  padding:10px 16px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.12);
  min-width:180px;
  letter-spacing:.04em;
}

@media (max-width:520px){
  .brand img{height:32px;}
  .contact-btn{
    width:88px;
    height:32px;
    padding:0;
    border-radius:8px;
    font-size:11px;
    min-width:auto;
    line-height:1;
    white-space:nowrap;
  }
}

/* ================= MAIN ================= */
main{
  flex:1;
  padding:14px 0 22px;
}

/* タイトル */
.hero{
  text-align:center;
  margin:12px 0 16px;
}
.hero h1{
  margin:0;
  font-size:20px;
  font-weight:900;
  letter-spacing:.10em;
}

/* ✅ カード廃止：全幅の“帯”セクション + 線区切り */
.section{
  width:100%;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}
.section.bandA{ background: var(--bandA); }
.section.bandB{ background: var(--bandB); }

/* セクション内側 */
.section .container{
  padding:14px 0;
}

/* ✅ カテゴリ名：中央 */
.section-title{
  text-align:center;
  font-size:14px;
  font-weight:900;
  margin:0 0 12px;
  letter-spacing:.08em;
}

/* ===== グリッド：スマホ3列固定 ===== */
.pill-grid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}
@media (max-width:520px){
  .pill-grid{
    grid-template-columns: repeat(3, 1fr) !important;
  }
}

/* ✅ ガラス風ボタン（黒すぎ問題を解決） */
.pill-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;

  /* ここが色の本体：#000を完全排除 */
  background: linear-gradient(180deg, var(--btnBg1), var(--btnBg2));
  color: rgba(255,255,255,.96);

  padding:9px 12px;
  min-height:42px;
  border-radius:14px;

  font-size:12px;
  font-weight:900;
  letter-spacing:.02em;

  border:1px solid var(--btnBorder);
  box-shadow: var(--shadowBtn);

  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
}

.pill-btn:hover{
  transform: translateY(-2px);
  box-shadow: 0 14px 34px rgba(15,23,42,.22);
  filter: brightness(1.06);
}

.pill-title{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  padding-right:8px;
}

/* ✅ 矢印：ガラス丸 + 透け */
.pill-icon{
  width:22px;
  height:22px;
  border-radius:999px;
  background: rgba(255,255,255,.16);
  border: 1px solid rgba(255,255,255,.22);
  color: rgba(255,255,255,.92);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  flex:0 0 auto;
}

/* PC拡張 */
@media (min-width:900px){
  main{padding:34px 0 54px;}
  .hero h1{font-size:26px;}
  .section .container{padding:18px 0;}
  .section-title{font-size:18px;margin-bottom:14px;}
  .pill-grid{grid-template-columns: repeat(4, 1fr); gap:14px;}
  .pill-btn{min-height:54px;font-size:14px;padding:14px 16px;border-radius:16px;}
  .pill-icon{width:28px;height:28px;font-size:14px;}
}

/* ================= FOOTER ================= */
footer{
  background:#000;
  color:#fff;
  padding:28px 0;
}
.footer-inner{
  display:grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap:20px;
}
.footer-left{
  font-size:13px;
  line-height:1.7;
}
.footer-links a{
  display:block;
  padding:3px 0;
  color:#ccc;
  font-size:13px;
}
@media(max-width:700px){
  .footer-inner{grid-template-columns:1fr;}
}
</style>
</head>

<body>

        <a class="pill-btn" href="#"><span class="pill-title">体調</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">目標</span><span class="pill-icon">→</span></a>

  <section class="section bandB">

  <section class="section bandA">

</main>

<footer>

</body>
</html>

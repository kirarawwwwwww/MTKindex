<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

<title>A beef | MTK インデックス</title>

<style>
:root{
  --blue:#2aa7d7;
  --blue2:#1b8fb8;
  --pageBg:#dfe5ee;
  --bandA: rgba(255,255,255,.32);
  --bandB: rgba(0,0,0,.03);
  --rule: rgba(0,0,0,.14);
  --shadowH: 0 10px 24px rgba(0,0,0,.18);
}

*{box-sizing:border-box}
html, body{height:100%;}

body{
  margin:0;
  font-family:'Montserrat','Noto Sans JP',sans-serif;
  background:var(--pageBg);
  color:#0f1115;
  line-height:1.5;
  display:flex;
  flex-direction:column;
}

a{text-decoration:none;color:inherit}
.container{
  width:min(1120px, calc(100% - 24px));
  margin:auto;
}

/* HEADER */
header{
  background:#000;
  position:sticky;
  top:0;
  z-index:10;
  box-shadow:var(--shadowH);
}
.header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 0;
}
.brand img{height:44px;}

.contact-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(180deg,var(--blue),var(--blue2));
  color:#fff;
  font-weight:900;
  padding:10px 16px;
  border-radius:12px;
  min-width:180px;
}

@media (max-width:520px){
  .brand img{height:32px;}
  .contact-btn{
    width:88px;
    height:32px;
    padding:0;
    border-radius:8px;
    font-size:11px;
    min-width:auto;
  }
}

/* MAIN */
main{
  flex:1;
  padding:20px 0 30px;
}

.hero{
  text-align:center;
  margin:10px 0 20px;
}
.hero h1{
  margin:0;
  font-size:24px;
  font-weight:900;
  letter-spacing:.08em;
}

/* セクション */
.section{
  width:100%;
  border-top:1px solid var(--rule);
  border-bottom:1px solid var(--rule);
}
.section.bandA{background:var(--bandA);}
.section.bandB{background:var(--bandB);}

.section .container{padding:16px 0;}

.section-title{
  text-align:center;
  font-size:16px;
  font-weight:900;
  margin:0 0 14px;
  letter-spacing:.08em;
}

.pill-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.pill-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#000;
  color:#fff;
  padding:6px 8px;
  min-height:36px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
}

.pill-title{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.pill-icon{
  width:18px;
  height:18px;
  border-radius:50%;
  background:#fff;
  color:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
}

@media (min-width:900px){
  .hero h1{font-size:28px;}
  .section-title{font-size:20px;}
  .pill-grid{grid-template-columns:repeat(4,1fr);gap:12px;}
  .pill-btn{min-height:48px;font-size:14px;padding:12px 14px;}
  .pill-icon{width:26px;height:26px;font-size:13px;}
}

/* FOOTER */
footer{
  background:#000;
  color:#fff;
  padding:28px 0;
}
.footer-inner{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
}
.footer-left{
  font-size:13px;
  line-height:1.7;
}
.footer-links a{
  display:block;
  padding:3px 0;
  color:#ccc;
  font-size:13px;
}
@media(max-width:700px){
  .footer-inner{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <a class="brand" href="#">
      <img src="logo.png" alt="A beef ロゴ">
    </a>
    <a href="#" class="contact-btn">アプリ管理</a>
  </div>
</header>

<main>

  <div class="container">
    <div class="hero">
      <h1>MTK インデックス</h1>
    </div>
  </div>

  <!-- 💰 -->
  <section class="section bandA">
    <div class="container">
      <div class="section-title">💰 お金</div>
      <div class="pill-grid">
        <a class="pill-btn" href="#"><span>予定</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span>支出</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span>ランコス</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span>予算</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span>資産</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span>税</span><span class="pill-icon">→</span></a>
      </div>
    </div>
  </section>

  <!-- 🧠 -->
  <section class="section bandB">
    <div class="container">
      <div class="section-title">🧠 自分</div>
      <div class="pill-grid">
        <a class="pill-btn" href="#"><span>自分</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span>ルール</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span>振返</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span>体調</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span>目標</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span>学び</span><span class="pill-icon">→</span></a>
      </div>
    </div>
  </section>

</main>

<footer>
  <div class="container footer-inner">
    <div class="footer-left">
      <strong>A beef</strong><br>
      株式会社MTK<br>
      代表取締役
    </div>
    <div class="footer-links">
      <a href="#">ホーム</a>
      <a href="#">サービス</a>
      <a href="#">会社概要</a>
      <a href="#">お問合せ</a>
    </div>
    <div></div>
  </div>
</footer>

</body>
</html>

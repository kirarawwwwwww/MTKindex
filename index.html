<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A beef | MTK インデックス</title>

<style>
:root{
  --blue:#2aa7d7;
  --blue2:#1b8fb8;
  --cardLav:#dcd0f0;
  --cardGry:#e8e8e8;
  --shadowH: 0 10px 24px rgba(0,0,0,.18);
}

*{box-sizing:border-box}
html, body{height:100%;}
body{
  margin:0;
  font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
  background: linear-gradient(180deg, #ffffff, #f7f3ea 100%);
  color:#0f1115;
  display:flex;
  flex-direction:column;
}

a{text-decoration:none;color:inherit}
.container{
  width:min(1120px, calc(100% - 24px));
  margin:auto;
}

/* ================= HEADER ================= */
header{
  background:#000;
  position:sticky;
  top:0;
  z-index:10;
  box-shadow: var(--shadowH);
}
.header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 0;
}
.brand img{
  height:44px;
  display:block;
}

/* PCボタン */
.contact-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background: linear-gradient(180deg, var(--blue), var(--blue2));
  color:#fff;
  font-weight:900;
  padding:10px 16px;
  border-radius:12px;
  min-width:180px;
}

/* スマホ：小さい四角 */
@media (max-width:520px){
  .brand img{height:32px;}
  .contact-btn{
    width:88px;
    height:32px;
    padding:0;
    border-radius:8px;
    font-size:11px;
    min-width:auto;
  }
}

/* ================= MAIN ================= */
main{
  flex:1;
  padding:14px 0 22px;
}

.hero{
  text-align:center;
  margin-bottom:12px;
}
.hero h1{
  margin:0;
  font-size:20px;
  font-weight:900;
}

/* カテゴリ */
.section{
  margin-bottom:12px;
  border-radius:18px;
  padding:12px 8px;
}
.lav{background:var(--cardLav);}
.gry{background:var(--cardGry);}

.section-title{
  text-align:center;
  font-size:14px;
  font-weight:900;
  margin-bottom:8px;
}

/* ================= グリッド ================= */

/* デフォルト（PCなど） */
.pill-grid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:8px;
}

/* ✅ スマホは強制3列 */
@media (max-width:520px){
  .pill-grid{
    grid-template-columns: repeat(3, 1fr) !important;
  }
}

/* ================= ボタン ================= */
.pill-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#000;
  color:#fff;
  padding:6px 8px;
  min-height:36px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}

.pill-title{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.pill-icon{
  width:18px;
  height:18px;
  border-radius:50%;
  background:#fff;
  color:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
}

/* PC拡張 */
@media (min-width:900px){
  main{padding:40px 0 60px;}
  .hero h1{font-size:26px;}
  .section{padding:22px 18px;border-radius:26px;}
  .section-title{font-size:18px;}
  .pill-btn{min-height:50px;font-size:14px;padding:12px 14px;}
  .pill-icon{width:26px;height:26px;font-size:13px;}
}

/* ================= FOOTER ================= */
footer{
  background:#000;
  color:#fff;
  padding:28px 0;
}
.footer-inner{
  display:grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap:20px;
}
.footer-left{
  font-size:13px;
  line-height:1.7;
}
.footer-links a{
  display:block;
  padding:3px 0;
  color:#ccc;
  font-size:13px;
}
@media(max-width:700px){
  .footer-inner{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <a class="brand" href="#">
      <img src="logo.png" alt="A beef ロゴ">
    </a>
    <a href="#" class="contact-btn">HPへ移動</a>
  </div>
</header>

<main>
  <div class="container">

    <div class="hero">
      <h1>MTK インデックス</h1>
    </div>

    <!-- お金 -->
    <section class="section lav">
      <div class="section-title">💰 お金</div>
      <div class="pill-grid">
        <a class="pill-btn"><span class="pill-title">予定</span><span class="pill-icon">→</span></a>
        <a class="pill-btn"><span class="pill-title">支出</span><span class="pill-icon">→</span></a>
        <a class="pill-btn"><span class="pill-title">ランコス</span><span class="pill-icon">→</span></a>
        <a class="pill-btn"><span class="pill-title">予算</span><span class="pill-icon">→</span></a>
        <a class="pill-btn"><span class="pill-title">資産</span><span class="pill-icon">→</span></a>
        <a class="pill-btn"><span class="pill-title">税</span><span class="pill-icon">→</span></a>
      </div>
    </section>

    <!-- 自分 -->
    <section class="section gry">
      <div class="section-title">🧠 自分</div>
      <div class="pill-grid">
        <a class="pill-btn"><span class="pill-title">自分</span><span class="pill-icon">→</span></a>
        <a class="pill-btn"><span class="pill-title">ルール</span><span class="pill-icon">→</span></a>
        <a class="pill-btn"><span class="pill-title">振返</span><span class="pill-icon">→</span></a>
        <a class="pill-btn"><span class="pill-title">体調</span><span class="pill-icon">→</span></a>
        <a class="pill-btn"><span class="pill-title">目標</span><span class="pill-icon">→</span></a>
        <a class="pill-btn"><span class="pill-title">学び</span><span class="pill-icon">→</span></a>
      </div>
    </section>

    <!-- 日常 -->
    <section class="section lav">
      <div class="section-title">✅ 日常</div>
      <div class="pill-grid">
        <a class="pill-btn"><span class="pill-title">日常</span><span class="pill-icon">→</span></a>
        <a class="pill-btn"><span class="pill-title">タスク</span><span class="pill-icon">→</span></a>
        <a class="pill-btn"><span class="pill-title">共有</span><span class="pill-icon">→</span></a>
        <a class="pill-btn"><span class="pill-title">買物</span><span class="pill-icon">→</span></a>
        <a class="pill-btn"><span class="pill-title">家事</span><span class="pill-icon">→</span></a>
        <a class="pill-btn"><span class="pill-title">連絡</span><span class="pill-icon">→</span></a>
      </div>
    </section>

  </div>
</main>

<footer>
  <div class="container footer-inner">
    <div class="footer-left">
      <strong>A beef</strong><br>
      株式会社MTK<br>
      代表取締役
    </div>
    <div class="footer-links">
      <a href="#">ホーム</a>
      <a href="#">サービス</a>
      <a href="#">会社概要</a>
      <a href="#">お問合せ</a>
    </div>
    <div></div>
  </div>
</footer>

</body>
</html>

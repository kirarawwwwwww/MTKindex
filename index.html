<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A beef | MTK インデックス</title>

<style>
:root{
  --cardLav:#dcd0f0;
  --cardGry:#e8e8e8;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
  background: linear-gradient(180deg, #ffffff, #f7f3ea 100%);
}

a{text-decoration:none;color:inherit}

.container{
  width:calc(100% - 28px);
  margin:auto;
}

/* ===== HEADER ===== */
header{
  background:#000;
  padding:16px 0;
  text-align:center;
}
header img{
  height:34px;
  display:block;
  margin:0 auto 12px;
}
.contact-btn{
  display:block;
  width:100%;
  background:linear-gradient(180deg,#2aa7d7,#1b8fb8);
  color:#fff;
  padding:12px;
  font-weight:900;
  border-radius:14px;
}

/* ===== MAIN ===== */
.main{padding:20px 0;}

.hero{
  text-align:center;
  margin-bottom:12px;
}
.hero h1{
  margin:0;
  font-size:20px;
  font-weight:900;
}

/* ===== CATEGORY CARD ===== */
.section{
  margin-bottom:12px;
  border-radius:18px;
  padding:12px 10px;
}
.lav{background:var(--cardLav);}
.gry{background:var(--cardGry);}

.section-title{
  text-align:center;
  font-size:15px;   /* ↓ 小さく */
  font-weight:900;
  margin-bottom:8px;
}

/* ===== ここ重要：スマホは常に2列 ===== */
.pill-grid{
  display:grid;
  grid-template-columns: 1fr 1fr !important;
  gap:8px;
}

/* ===== 超コンパクトボタン ===== */
.pill-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;

  background:#000;
  color:#fff;

  padding:8px 10px;
  min-height:40px;     /* ↓ 小さく */
  border-radius:999px;

  font-size:12px;
  font-weight:700;
}

.pill-title{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.pill-icon{
  width:22px;
  height:22px;
  border-radius:50%;
  background:#fff;
  color:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  flex-shrink:0;
}

/* PCだけ広く */
@media (min-width: 900px){
  .container{max-width:1100px;}
  .pill-grid{
    grid-template-columns: repeat(3,1fr);
  }
}
</style>
</head>

<body>

<header>
  <div class="container">
    <img src="logo.png" alt="logo">
    <a href="#" class="contact-btn">HPへ移動</a>
  </div>
</header>

<main class="main">
  <div class="container">

    <div class="hero">
      <h1>MTK インデックス</h1>
    </div>

    <!-- お金 -->
    <div class="section lav">
      <div class="section-title">💰 お金</div>
      <div class="pill-grid">
        <a class="pill-btn" href="#"><span class="pill-title">購入予定</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">支出管理</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">ランニングコスト</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">予算</span><span class="pill-icon">→</span></a>
      </div>
    </div>

    <!-- 自分 -->
    <div class="section gry">
      <div class="section-title">🧠 自分</div>
      <div class="pill-grid">
        <a class="pill-btn" href="#"><span class="pill-title">自分とは</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">自分ルール</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">振り返り</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">体調</span><span class="pill-icon">→</span></a>
      </div>
    </div>

    <!-- 日常 -->
    <div class="section lav">
      <div class="section-title">✅ 日常</div>
      <div class="pill-grid">
        <a class="pill-btn" href="#"><span class="pill-title">日常利用</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">タスク</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">共有</span><span class="pill-icon">→</span></a>
        <a class="pill-btn" href="#"><span class="pill-title">買い物</span><span class="pill-icon">→</span></a>
      </div>
    </div>

  </div>
</main>

</body>
</html>

<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ✅ スタイリッシュなフォント追加 -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

<title>A beef | MTK インデックス</title>

<style>
:root{
  --blue:#2aa7d7;
  --blue2:#1b8fb8;
  --pageBg:#dfe5ee;
  --bandA: rgba(255,255,255,.32);
  --bandB: rgba(0,0,0,.03);
  --rule: rgba(0,0,0,.14);
  --shadowH: 0 10px 24px rgba(0,0,0,.18);
}

*{box-sizing:border-box}
html, body{height:100%;}

/* ✅ フォント変更 */
body{
  margin:0;
  font-family: 'Montserrat', 'Noto Sans JP', sans-serif;
  background: var(--pageBg);
  color:#0f1115;
  line-height:1.5;
  display:flex;
  flex-direction:column;
}

a{text-decoration:none;color:inherit}
.container{
  width:min(1120px, calc(100% - 24px));
  margin:auto;
}

/* ================= HEADER ================= */
header{
  background:#000;
  position:sticky;
  top:0;
  z-index:10;
  box-shadow: var(--shadowH);
}
.header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 0;
  gap:12px;
}
.brand img{
  height:44px;
}

/* ボタン */
.contact-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background: linear-gradient(180deg, var(--blue), var(--blue2));
  color:#fff;
  font-weight:900;
  padding:10px 16px;
  border-radius:12px;
  min-width:180px;
  letter-spacing:.05em;
}

/* スマホ */
@media (max-width:520px){
  .brand img{height:32px;}
  .contact-btn{
    width:88px;
    height:32px;
    padding:0;
    border-radius:8px;
    font-size:11px;
    min-width:auto;
    white-space:nowrap;
  }
}

/* ================= MAIN ================= */
main{
  flex:1;
  padding:14px 0 22px;
}

.hero{
  text-align:center;
  margin:10px 0 14px;
}
.hero h1{
  margin:0;
  font-size:22px;
  font-weight:900;
  letter-spacing:.08em;
}

.section{
  width:100%;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}
.section.bandA{ background: var(--bandA); }
.section.bandB{ background: var(--bandB); }

.section .container{
  padding:14px 0;
}

/* ✅ カテゴリ名中央 */
.section-title{
  text-align:center;
  font-size:15px;
  font-weight:900;
  margin:0 0 12px;
  letter-spacing:.08em;
}

.pill-grid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:8px;
}

.pill-btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#000;
  color:#fff;
  padding:6px 8px;
  min-height:36px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
}

.pill-title{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  padding-right:6px;
}

.pill-icon{
  width:18px;
  height:18px;
  border-radius:50%;
  background:#fff;
  color:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
}

@media (min-width:900px){
  main{padding:34px 0 54px;}
  .hero h1{font-size:28px;}
  .section-title{font-size:20px;}
  .pill-grid{grid-template-columns: repeat(4, 1fr); gap:12px;}
  .pill-btn{min-height:48px;font-size:14px;padding:12px 14px;}
  .pill-icon{width:26px;height:26px;font-size:13px;}
}

/* ================= FOOTER ================= */
footer{
  background:#000;
  color:#fff;
  padding:28px 0;
}
.footer-inner{
  display:grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap:20px;
}
.footer-left{
  font-size:13px;
  line-height:1.7;
}
.footer-links a{
  display:block;
  padding:3px 0;
  color:#ccc;
  font-size:13px;
}
@media(max-width:700px){
  .footer-inner{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <a class="brand" href="#">
      <img src="logo.png" alt="A beef ロゴ">
    </a>
    <!-- ✅ ボタン名変更 -->
    <a href="#" class="contact-btn">アプリ管理</a>
  </div>
</header>

<main>
  <div class="container">
    <div class="hero">
      <h1>MTK インデックス</h1>
    </div>
  </div>

  <!-- セクションはそのまま -->
  <!-- （中身は元コードと同じため省略せずそのまま使用可能） -->

</main>

<footer>
  <div class="container footer-inner">
    <div class="footer-left">
      <strong>A beef</strong><br>
      株式会社MTK<br>
      代表取締役
    </div>
    <div class="footer-links">
      <a href="#">ホーム</a>
      <a href="#">サービス</a>
      <a href="#">会社概要</a>
      <a href="#">お問合せ</a>
    </div>
    <div></div>
  </div>
</footer>

</body>
</html>
